name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Verify committed dist/ matches a fresh build
        run: git diff --exit-code -- dist/battery-cell-card.js

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin
